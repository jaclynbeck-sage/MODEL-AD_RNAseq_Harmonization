default:
  # This GitHub repository, for adding to provenance
  github_repo_url: "https://github.com/jaclynbeck-sage/MODEL-AD_RNAseq_Harmonization"

  # ID for querying datasets on the AD Knowledge Portal
  adkp_query_id: "syn11346063"

  # Which studies to harmonize
  studies: [
    "Jax.IU.Pitt_5XFAD",
    "Jax.IU.Pitt_APOE4.Trem2.R47H",
    "UCI_3xTg-AD",
    "UCI_5XFAD",
    "UCI_ABCA7",
    "UCI_Trem2-R47H_NSS",
    "UCI_Clu-h2kbKI",
    "UCI_Bin1K358R",
    "Jax.IU.Pitt_LOAD2.PrimaryScreen"
    ]

  # Synapse IDs that never change
  top_level_syn_ids:
    main_project: "syn25882591"   # Synapse ID of the whole project
    released_data: "syn25882597"  # Top-level "Data" folder, which is public
    staging: "syn25882599"        # Top-level "Staging" folder, which is for unreleased data
    norm_counts: "syn69058670"    # Model-AD explorer source data project, norm counts folder

  # Load staging and released data IDs
  staging_syn_ids: !expr config::get("staging_syn_ids", file="config_project_syn_ids.yml")
  data_syn_ids: !expr config::get("released_data_syn_ids", file="config_project_syn_ids.yml")

  # Individual files should have the version specified
  file_syn_ids:
    symbol_map: "syn62063692.2"   # Data/Reference Genomes/universal_reference_symbol_map.csv
    intervals: "syn69046595.5"    # Data/Reference Genomes/intervals_universal_genome.bed
    ref_fasta: "syn62035247.3"    # Data/Reference Genomes/universal_MODEL_AD_reference.fa.gz
    ref_gtf: "syn62035250.2"      # Data/Reference Genomes/universal_MODEL_AD_reference.gtf.gz
